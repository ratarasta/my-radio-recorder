<!DOCTYPE html>
<html>
<head>
    <title>Manda un mensajito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; cursor: pointer; border-radius: 10px; border: none; width: 220px; font-weight: bold; }
        #record { background: #e74c3c; color: white; }
        #stop { background: #2ecc71; color: white; display: none; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; font-size: 1.1rem; }
        #timer { font-size: 2.5rem; margin: 15px 0; color: #f1c40f; display: none; }
    </style>
</head>
<body>
    <h1>🎙️ Station Recorder</h1>
    <p>Máximo 20 segundos por mensaje loka</p>
    <div id="timer">00:20</div>
    <button id="record">Start Recording</button>
    <button id="stop">Stop & Send to Radio</button>
    <div id="status">Ready.</div>

    <script>
        const AZURA_BASE_URL = "https://www.antifaz.co"; 
        const STATION_ID = "1";
        const API_KEY = "37ef13d410ddcdfb:c89135a6593f03ed8b4f260728b8b7bf";
        const MAX_SECONDS = 20;

        let mediaRecorder;
        let audioChunks = [];
        let countdownInterval;
        let timeLeft = MAX_SECONDS;

        const recordBtn = document.getElementById('record');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');
        const timerDisplay = document.getElementById('timer');

        recordBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Chrome/Firefox support 'audio/webm', Safari supports 'audio/mp4'
                // We'll use the browser's default to avoid corruption
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = uploadAudio;

                timeLeft = MAX_SECONDS;
                timerDisplay.innerText = "00:20";
                timerDisplay.style.display = 'block';
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = `00:${timeLeft < 10 ? "0" + timeLeft : timeLeft}`;
                    if (timeLeft <= 0) handleStop();
                }, 1000);

                mediaRecorder.start();
                recordBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                status.innerText = "🔴 Recording...";
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        function handleStop() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                clearInterval(countdownInterval);
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                timerDisplay.style.display = 'none';
                stopBtn.style.display = 'none';
                recordBtn.style.display = 'inline-block';
                status.innerText = "⏳ Processing...";
            }
        }

        stopBtn.onclick = handleStop;

        async function uploadAudio() {
            // We use audio/ogg as the label because AzuraCast ALWAYS processes .ogg
            const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
            const fileName = `msg_${Date.now()}.ogg`; 
            
            const formData = new FormData();
            formData.append('file', audioBlob, fileName);
            formData.append('path', 'uploads/' + fileName);

            try {
                const res = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/files/upload`, {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY },
                    body: formData
                });

                if (res.ok) {
                    status.innerText = "✅ Sent! Queueing...";
                    await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/queue`, {
                        method: 'POST',
                        headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file: 'uploads/' + fileName, is_request: true })
                    });
                    status.innerText = "📻 ON AIR SOON!";
                } else {
                    status.innerText = "❌ Station Error.";
                }
            } catch (err) {
                status.innerText = "❌ Connection Errorificos.";
            }
        }
    </script>
</body>
</html>
