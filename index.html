<!DOCTYPE html>
<html>
<head>
    <title>Mande un mensajito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; cursor: pointer; border-radius: 10px; border: none; width: 220px; font-weight: bold; }
        #record { background: #e74c3c; color: white; }
        #stop { background: #2ecc71; color: white; display: none; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; font-size: 1.1rem; }
        #timer { font-size: 2.5rem; margin: 15px 0; color: #f1c40f; display: none; }
    </style>
</head>
<body>
    <h1>🎙️ Estacion Recorder</h1>
    <p>Máximo 20 segundos por mensaje loka</p>
    <div id="timer">00:20</div>
    <button id="record">Start Recording</button>
    <button id="stop">Stop & Send to Radio</button>
    <div id="status">Ready.</div>

    <script>
        const AZURA_BASE_URL = "https://www.antifaz.co"; 
        const STATION_ID = "1";
        const API_KEY = "37ef13d410ddcdfb:c89135a6593f03ed8b4f260728b8b7bf";
        const MAX_SECONDS = 20;

        let mediaRecorder;
        let audioChunks = [];
        let countdownInterval;
        let timeLeft = MAX_SECONDS;

        const recordBtn = document.getElementById('record');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');
        const timerDisplay = document.getElementById('timer');

        recordBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Determine the best supported format (AAC is best for AzuraCast)
                let mimeType = 'audio/mp4'; 
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'audio/webm;codecs=opus';
                }

                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = uploadAudio;

                timeLeft = MAX_SECONDS;
                timerDisplay.innerText = "00:20";
                timerDisplay.style.display = 'block';
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = `00:${timeLeft < 10 ? "0" + timeLeft : timeLeft}`;
                    if (timeLeft <= 0) handleStop();
                }, 1000);

                mediaRecorder.start();
                recordBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                status.innerText = "🔴 Recording...";
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        function handleStop() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                clearInterval(countdownInterval);
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                timerDisplay.style.display = 'none';
                stopBtn.style.display = 'none';
                recordBtn.style.display = 'inline-block';
                status.innerText = "⏳ Processing...";
            }
        }

        stopBtn.onclick = handleStop;

        async function uploadAudio() {
            // Using M4A (AAC) which is natively supported and scanned by AzuraCast
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
            const extension = mediaRecorder.mimeType.includes('mp4') ? 'm4a' : 'webm';
            const fileName = `msg_${Date.now()}.${extension}`; 
            const filePath = 'uploads/' + fileName;
            
            const formData = new FormData();
            formData.append('file', audioBlob, fileName);
            formData.append('path', filePath);

            try {
                status.innerText = "🚀 Sending to Antifaz...";
                
                const uploadRes = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/files/upload`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 
                        'Authorization': `Bearer ${API_KEY}`,
                        'Accept': 'application/json'
                    },
                    body: formData
                });

                if (!uploadRes.ok) throw new Error(`Upload Failed: ${uploadRes.status}`);

                status.innerText = "✅ Saved! Adding to Radio...";
                await new Promise(r => setTimeout(r, 1000)); // Wait 1s for Azura indexing

                const queueRes = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/queue`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ file: filePath, is_request: true })
                });

                if (queueRes.ok) {
                    status.innerText = "📻 ON AIR SOON!";
                    setTimeout(() => { status.innerText = "Ready."; }, 5000);
                } else {
                    status.innerText = "⚠️ File saved, but queueing failed.";
                }

            } catch (err) {
                status.innerText = "❌ " + err.message;
            }
        }
    </script>
</body>
</html>
