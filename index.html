<!DOCTYPE html>
<html>
<head>
    <title>Radio Recorder Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; cursor: pointer; border-radius: 10px; border: none; width: 220px; font-weight: bold; }
        #record { background: #e74c3c; color: white; }
        #stop { background: #2ecc71; color: white; display: none; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎙️ Station Recorder</h1>
    <p>Note: This only works on <b>HTTPS</b> or <b>Localhost</b></p>
    
    <button id="record">Start Recording</button>
    <button id="stop">Stop & Send to Radio</button>
    <div id="status">Ready.</div>

    <script>
        // --- CONFIGURATION ---
        const AZURA_BASE_URL = "https://www.antifaz.co"; // MUST INCLUDE HTTPS://
        const STATION_ID = "1";
        const API_KEY = "37ef13d410ddcdfb:c89135a6593f03ed8b4f260728b8b7bf";

        let mediaRecorder;
        let audioChunks = [];

        const recordBtn = document.getElementById('record');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');

        recordBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Use WebM as it's the most compatible recording format for browsers
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = uploadAudio;

                mediaRecorder.start();
                recordBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                status.innerText = "🔴 Recording...";
            } catch (err) {
                alert("Microphone Error: " + err.message + "\n\nMake sure you are using HTTPS or Localhost!");
                console.error(err);
            }
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            // Stop the microphone tracks to save battery/privacy
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            
            stopBtn.style.display = 'none';
            recordBtn.style.display = 'inline-block';
            status.innerText = "⏳ Processing & Uploading...";
        };

        async function uploadAudio() {
            // We record as WebM but name it .webm; AzuraCast handles this perfectly.
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const fileName = `rec_${Date.now()}.mp3`;
            
            const formData = new FormData();
            formData.append('file', audioBlob, fileName);
            formData.append('path', 'uploads/' + fileName);

            try {
                status.innerText = "🚀 Sending to AzuraCast...";
                
                const uploadRes = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/files/upload`, {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY },
                    body: formData
                });

                if (uploadRes.ok) {
                    status.innerText = "✅ Uploaded! Adding to Queue...";
                    
                    const queueRes = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/queue`, {
                        method: 'POST',
                        headers: { 
                            'X-API-Key': API_KEY,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ file: 'uploads/' + fileName, is_request: true })
                    });

                    if(queueRes.ok) {
                        status.innerText = "📻 ON AIR SOON!";
                    } else {
                        status.innerText = "⚠️ Uploaded, but couldn't queue.";
                    }
                } else {
                    const errText = await uploadRes.text();
                    status.innerText = "❌ Upload Failed. Check Console.";
                    console.error("Upload Error:", errText);
                }
            } catch (err) {
                status.innerText = "❌ Network Error.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
