<!DOCTYPE html>
<html>
<head>
    <title>Radio Recorder Bridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; cursor: pointer; border-radius: 10px; border: none; width: 200px; }
        #record { background: #e74c3c; color: white; }
        #stop { background: #2ecc71; color: white; display: none; }
        #status { margin-top: 20px; color: #aaa; }
    </style>
</head>
<body>
    <h1>🎙️ Station Recorder</h1>
    <button id="record">Start Recording</button>
    <button id="stop">Stop & Send to Radio</button>
    <div id="status">Ready.</div>

    <script>
        // --- CONFIGURATION ---
        const AZURA_BASE_URL = "https://antifaz.co”; 
        const STATION_ID = "1";
        const API_KEY = "37ef13d410ddcdfb:c89135a6593f03ed8b4f260728b8b7bf";

        let mediaRecorder;
        let audioChunks = [];

        const recordBtn = document.getElementById('record');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');

        recordBtn.onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = uploadAudio;

            mediaRecorder.start();
            recordBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            status.innerText = "🔴 Recording...";
        };

        stopBtn.onclick = () => {
            mediaRecorder.stop();
            stopBtn.style.display = 'none';
            recordBtn.style.display = 'inline-block';
            status.innerText = "⏳ Uploading...";
        };

        async function uploadAudio() {
            const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
            const fileName = `web_capture_${Date.now()}.mp3`;
            
            const formData = new FormData();
            formData.append('file', audioBlob, fileName);
            formData.append('path', 'uploads/' + fileName);

            try {
                // 1. UPLOAD
                const uploadRes = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/files/upload`, {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY },
                    body: formData
                });

                if (uploadRes.ok) {
                    status.innerText = "✅ Uploaded! Adding to queue...";
                    // 2. QUEUE
                    await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/queue`, {
                        method: 'POST',
                        headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file: 'uploads/' + fileName, is_request: true })
                    });
                    status.innerText = "📻 Playing on air now!";
                } else {
                    status.innerText = "❌ Upload failed.";
                }
            } catch (err) {
                status.innerText = "❌ Error: " + err.message;
            }
        }
    </script>
</body>
</html>
