<!DOCTYPE html>
<html>
<head>
    <title>Manda un mensaje</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; cursor: pointer; border-radius: 10px; border: none; width: 220px; font-weight: bold; }
        #record { background: #e74c3c; color: white; }
        #stop { background: #2ecc71; color: white; display: none; }
        #status { margin-top: 20px; color: #00ff00; font-weight: bold; font-size: 1.1rem; }
        #timer { font-size: 2.5rem; margin: 15px 0; color: #f1c40f; display: none; }
    </style>
</head>
<body>
    <h1>🎙️ Station Recorder</h1>
    <p>Máximo 20 segundos por mensaje</p>
    
    <div id="timer">00:20</div>
    
    <button id="record">Start Recording</button>
    <button id="stop">Stop & Send to Radio</button>
    <div id="status">Ready.</div>

    <script>
        // --- CONFIGURATION ---
        const AZURA_BASE_URL = "https://www.antifaz.co"; 
        const STATION_ID = "1";
        const API_KEY = "37ef13d410ddcdfb:c89135a6593f03ed8b4f260728b8b7bf";
        const MAX_SECONDS = 20;

        let mediaRecorder;
        let audioChunks = [];
        let countdownInterval;
        let timeLeft = MAX_SECONDS;

        const recordBtn = document.getElementById('record');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');
        const timerDisplay = document.getElementById('timer');

        function updateTimerDisplay() {
            const sec = timeLeft < 10 ? "0" + timeLeft : timeLeft;
            timerDisplay.innerText = `00:${sec}`;
        }

        recordBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Detection for compatible types
                const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
                                 ? 'audio/webm;codecs=opus' 
                                 : 'audio/webm';

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    audioBitsPerSecond: 128000
                });
                
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = uploadAudio;

                timeLeft = MAX_SECONDS;
                updateTimerDisplay();
                timerDisplay.style.display = 'block';
                
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) { handleStop(); }
                }, 1000);

                mediaRecorder.start();
                recordBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                status.innerText = "🔴 Recording...";
            } catch (err) {
                alert("Microphone Error: " + err.message);
                console.error(err);
            }
        };

        function handleStop() {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                clearInterval(countdownInterval);
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                timerDisplay.style.display = 'none';
                stopBtn.style.display = 'none';
                recordBtn.style.display = 'inline-block';
                status.innerText = "⏳ Processing & Uploading...";
            }
        }

        stopBtn.onclick = handleStop;

        async function uploadAudio() {
            // FIX: Use the actual recorded mime type so the file isn't corrupted
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
            
            // AzuraCast generally handles .webm fine if the internal data matches.
            // If it still complains, we use .ogg as a fallback name.
            const fileName = `rec_${Date.now()}.webm`; 
            
            const formData = new FormData();
            formData.append('file', audioBlob, fileName);
            formData.append('path', 'uploads/' + fileName);

            try {
                status.innerText = "🚀 Sending to AzuraCast...";
                
                const uploadRes = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/files/upload`, {
                    method: 'POST',
                    headers: { 'X-API-Key': API_KEY },
                    body: formData
                });

                if (uploadRes.ok) {
                    status.innerText = "✅ Uploaded! Adding to Queue...";
                    
                    const queueRes = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/queue`, {
                        method: 'POST',
                        headers: { 
                            'X-API-Key': API_KEY,
                            'Content-Type': 'application/json' 
                        },
                        body: JSON.stringify({ file: 'uploads/' + fileName, is_request: true })
                    });

                    if(queueRes.ok) {
                        status.innerText = "📻 ON AIR SOON!";
                        setTimeout(() => { status.innerText = "Ready."; }, 5000);
                    } else {
                        status.innerText = "⚠️ Uploaded, but couldn't queue.";
                    }
                } else {
                    const errText = await uploadRes.text();
                    status.innerText = "❌ Station rejected file.";
                    console.error("Upload Error:", errText);
                }
            } catch (err) {
                status.innerText = "❌ Network Error.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
