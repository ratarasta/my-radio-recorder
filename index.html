<!DOCTYPE html>
<html>
<head>
    <title>Mojo Mojo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; background: #121212; color: white; transition: background 0.5s ease; }
        body.recording { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0% { background-color: #121212; } 50% { background-color: #610000; } 100% { background-color: #121212; } }
        .container { max-width: 400px; margin: 0 auto; }
        input { padding: 15px; width: 85%; border-radius: 10px; border: 1px solid #444; background: #222; color: white; font-size: 1rem; margin-top: 20px; text-align: center; outline: none; }
        button { padding: 20px; font-size: 1.2rem; margin: 10px; cursor: pointer; border-radius: 10px; border: none; width: 220px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: inline-block; }
        #record { background: #e74c3c; color: white; }
        #stop { background: #ffffff; color: #e74c3c; display: none; }
        #status { margin-top: 20px; font-weight: bold; font-size: 1.1rem; min-height: 1.5em; color: #00ff00; }
        .on-air-text { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        #timer { font-size: 4rem; margin: 10px 0; color: #f1c40f; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ Antifaz Recorder</h1>
        <p>Manda un mensaje de 5 segundos</p>
        <div id="timer">00:05</div>
        <button id="record">Grabar Mensaje</button>
        <button id="stop">DETENER</button>
        <br>
        <input type="text" id="nickname" placeholder="Nickname (Opcional)" maxlength="15">
        <div id="status">Ready.</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const AZURA_BASE_URL = "https://www.antifaz.co"; 
        const STATION_ID = "1";
        const API_KEY = "177093c549ffeadf:c5c6c62943fee9da8db322da6bba0371";
        const TARGET_FOLDER = "ZZZ"; 

        let mediaRecorder;
        let audioChunks = [];
        let countdownInterval;
        let timeLeft = 5;

        const recordBtn = document.getElementById('record');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');
        const timerDisplay = document.getElementById('timer');
        const nicknameInput = document.getElementById('nickname');
        const body = document.body;

        function resetUI() {
            body.classList.remove('recording');
            timerDisplay.style.display = 'none';
            stopBtn.style.display = 'none';
            recordBtn.style.display = 'inline-block';
            nicknameInput.disabled = false;
        }

        recordBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                let mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm;codecs=opus';
                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
                audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = uploadAudio;

                timeLeft = 5;
                timerDisplay.innerText = "00:05";
                timerDisplay.style.display = 'block';
                nicknameInput.disabled = true;
                body.classList.add('recording');
                recordBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                status.innerHTML = "<span class='on-air-text'>🔴 EN EL AIRE...</span>";

                countdownInterval = setInterval(() => {
                    timeLeft--;
                    timerDisplay.innerText = `00:0${timeLeft}`;
                    if (timeLeft <= 0) handleStop();
                }, 1000);
                mediaRecorder.start();
            } catch (err) {
                alert("Error de micrófono. Revisa los permisos.");
            }
        };

        function handleStop() {
            clearInterval(countdownInterval);
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
            resetUI();
            status.innerText = "⏳ Subiendo...";
        }

        stopBtn.addEventListener('click', handleStop);

        async function uploadAudio() {
            const rawNickname = nicknameInput.value.trim() || "anon";
            const userNickname = rawNickname.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const extension = mediaRecorder.mimeType.includes('mp4') ? 'm4a' : 'webm';
            const fileName = `${userNickname}_${Date.now()}.${extension}`; 
            
            const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
            const formData = new FormData();
            
            // The file itself
            formData.append('file', audioBlob, fileName);
            
            // The folder path (now that CORS is fixed, this should work!)
            formData.append('path', `${TARGET_FOLDER}/${fileName}`);

            try {
                const response = await fetch(`${AZURA_BASE_URL}/api/station/${STATION_ID}/files/upload`, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'X-API-Key': API_KEY, // Modern AzuraCast API header
                        'Accept': 'application/json'
                    },
                    body: formData
                });

                const result = await response.json();
                console.log("AzuraCast Response:", result);

                if (response.ok) {
                    status.innerText = "📻 ¡Enviado a " + TARGET_FOLDER + "!";
                    nicknameInput.value = "";
                    setTimeout(() => { status.innerText = "Ready."; }, 5000);
                } else {
                    status.innerText = "❌ Error: " + (result.message || "403 Forbidden");
                }
            } catch (err) {
                console.error("Connection error:", err);
                status.innerText = "📢 Error de red. Revisa la consola.";
                resetUI();
            }
        }
    </script>
</body>
</html>
